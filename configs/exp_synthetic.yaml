# Experiment 1: Synthetic Verification
# Verifies Theorems 1-3 in the linear setting.

experiment:
  name: "synthetic_verification"
  type: "synthetic"

synthetic:
  d_out: 256
  d_in: 128
  n_samples: 10000
  n_test: 2000

  teacher_spectra:
    sharp_decay:
      values: [10.0, 5.0, 2.5, 1.25, 0.1, 0.05, 0.02, 0.01]
    gradual_decay:
      values: [10.0, 9.0, 8.0, 7.0, 6.0, 5.0, 4.0, 3.0]
    flat_spectrum:
      values: [5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0]

  data_covariances:
    isotropic:
      type: "identity"
    anisotropic:
      type: "exponential_decay"
      condition_number: 100

  ranks: [1, 2, 4, 8]
  learning_rate: 0.01
  num_steps: 5000
  methods: ["standard_kd", "sad_lora"]

  verify_theorem1: true
  verify_theorem2: true
  verify_theorem3: true
